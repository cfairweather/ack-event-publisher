name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_REPO: ghcr.io/${{ github.repository_owner }}/ack-event-publisher
  CHART_REPO: ghcr.io/${{ github.repository_owner }}/charts

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: tidy
        run: go mod tidy && git diff --exit-code go.sum

      - name: vet
        run: go vet ./...

      - name: test
        run: go test ./... -v -count=1

  build-push:
    name: build-push
    runs-on: ubuntu-latest
    needs: test
    # Only publish on pushes to main, not PRs
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set build metadata
        id: meta
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "build_date=${BUILD_DATE}"  >> $GITHUB_OUTPUT
          echo "image_tag=sha-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "chart_version=0.1.0-${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push container image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_REPO }}:${{ steps.meta.outputs.image_tag }}
            ${{ env.IMAGE_REPO }}:latest
          build-args: |
            GIT_VERSION=${{ steps.meta.outputs.image_tag }}
            GIT_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Package Helm chart
        run: |
          helm package ./helm \
            --version ${{ steps.meta.outputs.chart_version }} \
            --app-version ${{ steps.meta.outputs.image_tag }}

      - name: Push Helm chart to ghcr.io
        run: |
          helm push ack-event-publisher-${{ steps.meta.outputs.chart_version }}.tgz \
            oci://${{ env.CHART_REPO }}
