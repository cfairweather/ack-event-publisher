{{- if .Values.leaderElection.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "ack-event-publisher.fullname" . }}-leader-election
  namespace: {{ default .Release.Namespace .Values.leaderElection.namespace }}
  labels:
    {{- include "ack-event-publisher.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "ack-event-publisher.fullname" . }}-leader-election
subjects:
  - kind: ServiceAccount
    name: {{ include "ack-event-publisher.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
