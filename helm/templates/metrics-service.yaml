{{- if .Values.metrics.service.create }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ack-event-publisher.fullname" . }}-metrics
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ack-event-publisher.labels" . | nindent 4 }}
spec:
  ports:
    - name: metrics
      port: {{ .Values.metrics.service.port }}
      targetPort: metrics
      protocol: TCP
  selector:
    {{- include "ack-event-publisher.selectorLabels" . | nindent 4 }}
{{- end }}
