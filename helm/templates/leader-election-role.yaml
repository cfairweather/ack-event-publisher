{{- if .Values.leaderElection.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "ack-event-publisher.fullname" . }}-leader-election
  namespace: {{ default .Release.Namespace .Values.leaderElection.namespace }}
  labels:
    {{- include "ack-event-publisher.labels" . | nindent 4 }}
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["create", "get", "list", "patch", "update", "watch"]
{{- end }}
