  - ack
  - kubernetes
  - events
  - controllers
home: https://github.com/aws-controllers-k8s/ack-event-publisher
sources:
  - https://github.com/aws-controllers-k8s/ack-event-publisher
maintainers:
  - name: AWS Controllers for Kubernetes Contributors
    url: https://github.com/aws-controllers-k8s
